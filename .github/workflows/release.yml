name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Extract version from tag — strips leading 'v' (e.g. v0.2.0 → 0.2.0)
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Publish system.json into dist with the correct versioned download URL
      - name: Prepare dist/system.json
        run: |
          cp system.json dist/system.json
          jq \
            --arg url "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/odd-rpg.zip" \
            '.download = $url' \
            dist/system.json > dist/system.tmp.json
          mv dist/system.tmp.json dist/system.json

      # Guard: abort if the manifest version doesn't match the tag
      - name: Validate version consistency
        run: |
          MANIFEST_VERSION=$(jq -r '.version' dist/system.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — system.json has $MANIFEST_VERSION but tag is $TAG_VERSION"
            exit 1
          fi

      - name: Create ZIP
        run: cd dist && zip -r ../odd-rpg.zip .

      # Attach system.json and the ZIP to the GitHub Release created by release-please
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/system.json
            odd-rpg.zip
